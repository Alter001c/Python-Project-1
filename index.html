<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="app.js"></script>
    <title>Gestión de Inventario</title>
</head>
<body>
    <div id="main_container">
        <!-- Modal Agregar Producto -->
        <div id="add_product_modal" class="hidden">
            <div id="add_product_container">
                <div class="header">
                    <h1>Agregar Producto</h1>
                </div>
                <div id="info">
                    <div id="name_field">
                        <label for="name">Nombre:</label>
                        <input id="name" type="text" placeholder="Ej: Collar de perlas">
                    </div>
                    <div id="price_field">
                        <label for="price">Precio:</label>
                        <input id="price" type="number" step="0.01" placeholder="0.00">
                    </div>
                    <div id="unit_field">
                        <label for="unit">Unidad:</label>
                        <select id="unit">
                            <option value="unidad">Unidad</option>
                            <option value="metro">Metro</option>
                        </select>
                    </div>
                    <div id="desc_field">
                        <label for="desc">Descripción:</label>
                        <input id="desc" type="text" placeholder="Descripción opcional">
                    </div>
                </div>
                <div id="modal_actions">
                    <button id="cancel_button">Cancelar</button>
                    <button id="accept_button">Aceptar</button>
                </div>
            </div>
        </div>

        <!-- Modal Carrito -->
        <div id="cart_modal" class="hidden">
            <div id="cart_container">
                <div class="header">
                    <h1>🛒 Carrito de Compras</h1>
                </div>
                <div id="cart_content">
                    <div id="cart_items"></div>
                    <div id="cart_total">
                        <strong>Total: $<span id="cart_total_amount">0.00</span></strong>
                    </div>
                </div>
                <div id="modal_actions">
                    <button id="close_cart_button">Cerrar</button>
                    <button id="checkout_button" class="primary">Generar Factura</button>
                </div>
            </div>
        </div>

        <!-- Modal Factura -->
        <div id="invoice_modal" class="hidden">
            <div id="invoice_container">
                <div class="header">
                    <h1>🧾 Factura</h1>
                </div>
                <div id="invoice_content">
                    <div id="invoice_header">
                        <p><strong>N° Factura:</strong> <span id="invoice_number"></span></p>
                        <p><strong>Fecha:</strong> <span id="invoice_date"></span></p>
                    </div>
                    <div id="invoice_items"></div>
                    <div id="invoice_total">
                        <strong>TOTAL: $<span id="invoice_total_amount">0.00</span></strong>
                    </div>
                </div>
                <div id="modal_actions">
                    <button id="close_invoice_button">Cerrar</button>
                </div>
            </div>
        </div>

        <!-- Sidebar -->
        <div id="sections_bar">
            <div class="section_button_container">
                <button class="section_button active" id="section_button_product" data-section="products">
                    <span class="icon">📦</span> Productos
                </button>
            </div>
            <div class="section_button_container">
                <button class="section_button" id="section_button_invoices" data-section="invoices">
                    <span class="icon">🧾</span> Facturas
                </button>
            </div>
            <div class="section_button_container">
                <button class="section_button" id="section_button_cart" data-section="cart">
                    <span class="icon">🛒</span> Carrito <span id="cart_badge" class="badge">0</span>
                </button>
            </div>
        </div>

        <!-- Contenido Principal -->
        <div id="display_information_container">
            <div id="header_container">
                <div id="title">
                    <h1>Gestión de Inventario</h1>
                </div>
                <div id="searchbar_container">
                    <input id="searchbar" type="text" placeholder="Buscar productos...">
                </div>
            </div>
            <div id="display_information">
                <div id="products_view" class="view active">
                    <div id="products_container"></div>
                </div>
                <div id="invoices_view" class="view" style="display:none;">
                    <div id="invoices_container"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
